spring.application.name=product-detail-cache
server.port=8080

spring.datasource.url=${PRODUCT_CACHE_DB_URL:jdbc:h2:file:./data/product-detail-cache;MODE=MYSQL;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${PRODUCT_CACHE_DB_DRIVER:org.h2.Driver}
spring.datasource.username=${PRODUCT_CACHE_DB_USERNAME:sa}
spring.datasource.password=${PRODUCT_CACHE_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

product.cache.ttl-seconds=${PRODUCT_CACHE_TTL_SECONDS:600}
product.cache.version-ttl-seconds=${PRODUCT_CACHE_VERSION_TTL_SECONDS:3600}
product.cache.invalidation-fixed-delay-ms=${PRODUCT_CACHE_INVALIDATION_FIXED_DELAY_MS:5000}
product.cache.max-retry-count=${PRODUCT_CACHE_MAX_RETRY_COUNT:20}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
