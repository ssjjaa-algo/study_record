spring.application.name=ticket-consumer
server.port=8081

spring.datasource.url=${TICKET_DB_URL:jdbc:h2:file:./data/ticket;MODE=MYSQL;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${TICKET_DB_DRIVER:org.h2.Driver}
spring.datasource.username=${TICKET_DB_USERNAME:sa}
spring.datasource.password=${TICKET_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

ticket.issue.stream-key=ticket:issue:stream
ticket.issue.failure-stream-key=ticket:issue:stream:failed
ticket.consumer.group-name=ticket-issue-consumers
ticket.consumer.name=
ticket.consumer.batch-size=100
ticket.consumer.poll-delay-ms=100
ticket.consumer.pending-min-idle-ms=10000
ticket.consumer.max-delivery-count=5

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
