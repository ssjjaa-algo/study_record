global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
        labels:
          application: prometheus
          environment: local

  - job_name: spring-boot
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/spring-apps.yml
        refresh_interval: 15s
    relabel_configs:
      - source_labels:
          - scheme
        target_label: __scheme__
      - source_labels:
          - metrics_path
        target_label: __metrics_path__
      - regex: scheme|metrics_path
        action: labeldrop

  - job_name: spring-health
    metrics_path: /probe
    params:
      module:
        - http_2xx
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/spring-health.yml
        refresh_interval: 15s
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
