groups:
  - name: spring-service-health
    rules:
      - alert: SpringServiceDown
        expr: up{job="spring-boot"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Spring service is not scrapeable"
          description: "{{ $labels.application }} on {{ $labels.instance }} has not exposed metrics for more than 1 minute."

      - alert: SpringHealthEndpointFailing
        expr: probe_success{job="spring-health"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Spring health endpoint is failing"
          description: "{{ $labels.application }} health probe failed at {{ $labels.instance }}."

      - alert: SpringHeapHigh
        expr: |
          (
            sum by (application, instance) (jvm_memory_used_bytes{area="heap"})
            /
            sum by (application, instance) (jvm_memory_max_bytes{area="heap"} > 0)
          ) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Heap usage is high"
          description: "{{ $labels.application }} heap usage stayed above 85% for 5 minutes."

      - alert: SpringGcPauseHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (application, instance, le) (rate(jvm_gc_pause_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GC pause p95 is high"
          description: "{{ $labels.application }} GC pause p95 is above 1 second."

      - alert: SpringHttpServerErrors
        expr: |
          sum by (application, instance) (
            rate(http_server_requests_seconds_count{outcome="SERVER_ERROR"}[5m])
          ) > 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "HTTP 5xx error rate increased"
          description: "{{ $labels.application }} is serving more than 0.1 server errors per second."

      - alert: SpringHttpLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (application, instance, le) (rate(http_server_requests_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP p95 latency is high"
          description: "{{ $labels.application }} p95 HTTP latency stayed above 1 second."

      - alert: HikariConnectionsPending
        expr: hikaricp_connections_pending > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool is saturated"
          description: "{{ $labels.application }} has pending HikariCP connections."
